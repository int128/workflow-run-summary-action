name: e2e-target

on:
  workflow_run:
    workflows:
      - e2e-fixture
    types:
      - completed

jobs:
  test:
    if: github.event.workflow_run.actor == 'int128'
    name: test / ${{ github.event_name }} / ${{ github.event.action }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
      - run: npm install -g corepack
      - run: corepack enable
      - run: pnpm i
      - run: pnpm build

      - uses: ./
        id: summary
      - run: echo "cancelled = ${{ steps.summary.outputs.cancelled }}"
      - run: echo "skipped = ${{ steps.summary.outputs.skipped }}"
      - run: echo "$messages"
        env:
          messages: ${{ steps.summary.outputs.annotation-messages }}
      - run: echo "$messages"
        env:
          messages: ${{ steps.summary.outputs.annotation-failure-messages }}

      - if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const details_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.checks.create({
              ...context.repo,
              name: 'e2e-target',
              head_sha: context.payload.workflow_run.head_sha,
              conclusion: '${{ job.status }}',
              details_url,
              output: {
                title: '${{ job.status }}',
                summary: details_url,
              },
            })
